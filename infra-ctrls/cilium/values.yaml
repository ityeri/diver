ipam:
  mode: kubernetes

kubeProxyReplacement: true

operator:
  replicas: 1

securityContext:
  capabilities:
    ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE

cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup

k8sServiceHost: localhost
k8sServicePort: 7445

l2announcements:
  enabled: true

l2podAnnouncements:
  enabled: false

externalIPs:
  enabled: true

k8sClientRateLimit:
  qps: 20
  burst: 40

devices: enp2s0
